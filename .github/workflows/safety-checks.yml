# Safety checks for known bugs.
# Runs on every push and PR to catch accidental re-introduction of fixed issues.

name: Safety Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-set3-hook:
    name: Check SET3 hook is disabled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure SET3 opcode hook is NOT active
        run: |
          echo "=== Checking that SET3 hook remains disabled ==="
          echo ""
          echo "Background: ANY interception of the SET3 opcode handler (opcode 0x1E)"
          echo "causes the infirmary scene to hang (Dr. Kadowaki walk-to-phone freeze)."
          echo "This was diagnosed in session 9 (v0.09.32-v0.09.40) via binary search."
          echo "Both MinHook and dispatch table approaches trigger the bug."
          echo "Even a minimal wrapper (call original + return) breaks the engine."
          echo "See DEVNOTES.md 'Infirmary Glitch' section for full details."
          echo ""

          # Positive signal check: the disabled SET3 block MUST contain "PERMANENTLY DISABLED"
          # on a comment line near the SET3 hook code. This is more reliable than trying
          # to detect all possible ways the hook could be re-enabled via line-by-line grep.
          if grep -q 'SET3.*PERMANENTLY DISABLED' src/field_navigation.cpp; then
            echo "PASS: SET3 hook has PERMANENTLY DISABLED marker. Infirmary scene is safe."
          else
            echo "FAIL: Cannot find 'SET3.*PERMANENTLY DISABLED' marker in field_navigation.cpp."
            echo "The SET3 opcode hook must remain disabled. See DEVNOTES.md."
            exit 1
          fi
